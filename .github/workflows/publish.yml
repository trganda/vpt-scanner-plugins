name: Build and publish scanner plugins

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
      capability: ${{ steps.plugin.outputs.capability }}
    steps:
      - name: Require stable release
        id: plugin
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          test "$IS_PRERELEASE" = false
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            capability=all
          elif [[ "$RELEASE_TAG" =~ ^plugin-(portscan|subdomain|httpprobe|vuln)-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            capability="${BASH_REMATCH[1]}"
          else
            echo "unsupported release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "capability=$capability" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - id: commit
        run: echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        plugin:
          - capability: portscan
            module: portscan
          - capability: subdomain
            module: subfinder
          - capability: httpprobe
            module: httpprobe
          - capability: vuln
            module: nuclei
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.commit }}
      - uses: actions/setup-go@v6
        if: needs.validate.outputs.capability == 'all' || needs.validate.outputs.capability == matrix.plugin.capability
        with:
          go-version-file: ${{ matrix.plugin.module }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ matrix.plugin.module }}/go.sum
            sdk/go.sum
      - name: Build plugin
        if: needs.validate.outputs.capability == 'all' || needs.validate.outputs.capability == matrix.plugin.capability
        working-directory: ${{ matrix.plugin.module }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          OUTPUT: ../dist/${{ matrix.plugin.capability }}_linux_${{ matrix.arch }}
        run: mkdir -p ../dist && GOWORK=off go build -trimpath -o "$OUTPUT" .
      - uses: actions/upload-artifact@v7
        if: needs.validate.outputs.capability == 'all' || needs.validate.outputs.capability == matrix.plugin.capability
        with:
          name: plugin-${{ matrix.plugin.capability }}-linux-${{ matrix.arch }}
          path: dist/${{ matrix.plugin.capability }}_linux_${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

  collect:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: plugin-*
          path: dist
          merge-multiple: true
      - id: subjects
        working-directory: dist
        run: echo "subjects=$(sha256sum *_linux_* | base64 -w0)" >>"$GITHUB_OUTPUT"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GH_REPO"

  provenance:
    needs: collect
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.collect.outputs.subjects }}
      upload-assets: true
