syntax = "proto3";

package scan.v1;

option go_package = "github.com/trganda/vpt-backend/plugins/sdk/proto/scan/v1;scanv1";

// ScanPlugin is the generic contract every scanner tool plugin implements. It
// mirrors the host-side scan.Executor port: Capability advertises the tool's
// capability string, Execute runs one scan, and Prepare is a pre-scan hook
// (a no-op for every tool except nuclei, which uses it to sync templates).
//
// Tool-specific result payloads never appear in this contract: Execute returns
// the result as opaque JSON bytes (raw_json) so the host decodes it into the
// same map[string]any it persists as JSONB today, keeping the result processor
// unchanged.
service ScanPlugin {
  rpc Capability(CapabilityRequest) returns (CapabilityResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
}

message CapabilityRequest {}

message CapabilityResponse {
  string capability = 1;
}

message ExecuteRequest {
  string host = 1;
  map<string, string> params = 2;
}

message ExecuteResponse {
  string capability = 1;
  // raw_json is json.Marshal of the tool's ScanResult.Raw payload.
  bytes raw_json = 2;
  int64 started_at_unix_nano = 3;
  int64 finished_at_unix_nano = 4;
}

// PrepareRequest carries the control-plane-issued node JWT so a plugin that
// needs to fetch remote state (nuclei: the template bundle) can authenticate.
// The token is read fresh at call time on the host side, so it can't be a
// static env var.
message PrepareRequest {
  string auth_token = 1;
}

message PrepareResponse {}
